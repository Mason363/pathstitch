    position: fixed; left: 10px; bottom: 8px; font: 11px ui-monospace, monospace;

  }
  #hud .ok { color: #57c777; }
  #hud .warn { color: #e2a23b; }

<!-- Same Three.js the 3D viewport uses (r128 global build + OrbitControls). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">construct · drop a .dxf / .stch, or fold the active sketch</div>
<div id="snaptag" style="position:absolute;pointer-events:none;display:none;font:11px -apple-system,sans-serif;color:#0b0c0e;background:rgba(255,255,255,0.92);padding:1px 5px;border-radius:3px;transform:translate(12px,12px);white-space:nowrap;z-index:5;"></div>
<script>
"use strict";

// ---- bridge helpers -------------------------------------------------------
function post(obj){ try{ window.webkit.messageHandlers.construct.postMessage(JSON.stringify(obj)); }catch(e){} }
window.onerror = function(m,s,l){ post({op:"consoleError", message:String(m), source:String(s||""), lineno:l||0}); };

// ---- tiny vec3 math (flat [x,y,z] arrays) ---------------------------------
function sub(a,b){ return [a[0]-b[0],a[1]-b[1],a[2]-b[2]]; }
function add(a,b){ return [a[0]+b[0],a[1]+b[1],a[2]+b[2]]; }
function scl(a,s){ return [a[0]*s,a[1]*s,a[2]*s]; }
function dot(a,b){ return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function cross(a,b){ return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function len(a){ return Math.hypot(a[0],a[1],a[2]); }
function norm(a){ const l=len(a)||1; return [a[0]/l,a[1]/l,a[2]/l]; }
// Rodrigues: rotate point p about axis through origin `o`, unit dir `u`, angle t.
function rotAbout(p,o,u,t){
  const v=sub(p,o), c=Math.cos(t), s=Math.sin(t);
  const term1=scl(v,c);
  const term2=scl(cross(u,v),s);
  const term3=scl(u, dot(u,v)*(1-c));
  return add(o, add(add(term1,term2),term3));
}

// ---- three.js scene -------------------------------------------------------
const canvas=document.getElementById("c");
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1e1f22);
let camera=new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100000);
camera.position.set(120,140,180);
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
// Mockup-grade output: filmic tone mapping, sRGB, soft shadows.
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const controls=new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.screenSpacePanning=true;   // pan moves the object across the screen, intuitively
// Standard CAD feel so the object is easy to move: left-drag orbits, right-drag
// pans, scroll zooms. Clicks (near-zero movement) still fall through to tool
// picking — only actual drags drive the camera.
controls.mouseButtons={ LEFT:THREE.MOUSE.ROTATE, MIDDLE:THREE.MOUSE.DOLLY, RIGHT:THREE.MOUSE.PAN };
controls.touches={ ONE:THREE.TOUCH.ROTATE, TWO:THREE.TOUCH.DOLLY_PAN };

// Blender-style object transform gizmo (move/rotate/scale a panel in 3D). It's a
// pose override stored per-panel — it never edits the 2D sketch — and the panel
// stays live-linked (2D shape/fold edits rebuild and the override re-applies).
const tcontrols=new THREE.TransformControls(camera, renderer.domElement);
tcontrols.setSize(0.85);
tcontrols.addEventListener('dragging-changed', e=>{ controls.enabled=!e.value; if(!e.value) commitGizmo(true); });
tcontrols.addEventListener('objectChange', ()=>{ applyGizmoLive(); });
scene.add(tcontrols);
const gizmoProxy=new THREE.Object3D(); scene.add(gizmoProxy);
let gizmoPanel=null;

// Image-based lighting from a small procedural sky/studio gradient (soft, free).
function makeEnv(){
  const c=document.createElement("canvas"); c.width=16; c.height=64; const g=c.getContext("2d");
  const grd=g.createLinearGradient(0,0,0,64);
  grd.addColorStop(0.0,"#cdd6e4"); grd.addColorStop(0.45,"#8a93a3"); grd.addColorStop(0.55,"#5d6470"); grd.addColorStop(1.0,"#23262b");
  g.fillStyle=grd; g.fillRect(0,0,16,64);
  const tex=new THREE.CanvasTexture(c); tex.mapping=THREE.EquirectangularReflectionMapping;
  const pm=new THREE.PMREMGenerator(renderer); const env=pm.fromEquirectangular(tex).texture;
  tex.dispose(); pm.dispose(); return env;
}
try{ scene.environment=makeEnv(); }catch(e){}

// User-controllable lighting (Illustrator-style): a list of directional lights,
// each with colour / intensity / rotation(azimuth) / height(elevation) / softness.
// The first visible light throws the soft contact shadow. A faint hemisphere +
// ambient give a base fill so nothing is ever pitch-black. Swift pushes the real
// config via setConstructLighting; we seed a sensible default below.
const HEMI=new THREE.HemisphereLight(0xeaf0ff, 0x3a3f47, 0.30); scene.add(HEMI);
const AMBIENT=new THREE.AmbientLight(0xffffff, 0.25); scene.add(AMBIENT);
let LIGHT_POOL=[];
function makePoolLight(){ const L=new THREE.DirectionalLight(0xffffff,1); L.castShadow=false; scene.add(L); LIGHT_POOL.push(L); return L; }
function configShadow(L){
  L.shadow.mapSize.set(2048,2048);
  L.shadow.camera.near=1; L.shadow.camera.far=4000;
  L.shadow.camera.left=-900; L.shadow.camera.right=900;
  L.shadow.camera.top=900; L.shadow.camera.bottom=-900;
  L.shadow.bias=-0.0004;
}
function lightDir(rotDeg, heightDeg){
  const az=(rotDeg||0)*Math.PI/180, el=(heightDeg||0)*Math.PI/180;
  return [Math.cos(el)*Math.sin(az), Math.sin(el), Math.cos(el)*Math.cos(az)];
}
// cfg = {ambient, lights:[{color(int), intensity, rotation, height, softness, on}]}
window.setConstructLighting=function(jsonStr){
  let cfg; try{ cfg=(typeof jsonStr==="string")?JSON.parse(jsonStr):jsonStr; }catch(e){ return; }
  const lights=cfg.lights||[];
  const amb=(cfg.ambient!=null?cfg.ambient:0.25);
  AMBIENT.intensity=amb; HEMI.intensity=0.15+0.5*amb;
  while(LIGHT_POOL.length<lights.length) makePoolLight();
  let caster=-1;
  for(let i=0;i<LIGHT_POOL.length;i++){
    const L=LIGHT_POOL[i], c=lights[i];
    L.castShadow=false;
    if(!c || c.on===false){ L.visible=false; continue; }
    L.visible=true; L.color.setHex((c.color>>>0)||0xffffff);
    L.intensity=(c.intensity!=null?c.intensity:1.8);
    const d=lightDir(c.rotation, c.height!=null?c.height:45), R=900;
    L.position.set(d[0]*R, Math.max(d[1],0.12)*R, d[2]*R);
    if(caster<0){ caster=i;
      if(!L.userData.shadowCfg){ configShadow(L); L.userData.shadowCfg=true; }
      L.castShadow=true; L.shadow.radius=1+(c.softness!=null?c.softness:0.4)*10;
    }
  }
};
makePoolLight();
window.setConstructLighting({ambient:0.26, lights:[{color:0xffffff,intensity:2.2,rotation:145,height:45,softness:0.4,on:true}]});

// Soft contact shadow on the ground (transparent catcher) + faint grid.
const shadowCatcher=new THREE.Mesh(new THREE.PlaneGeometry(6000,6000),
  new THREE.ShadowMaterial({opacity:0.26}));
shadowCatcher.rotation.x=-Math.PI/2; shadowCatcher.position.y=-0.05; shadowCatcher.receiveShadow=true; scene.add(shadowCatcher);
const grid=new THREE.GridHelper(600,60,0x3a3d42,0x2a2c30); grid.position.y=0; grid.material.opacity=0.5; grid.material.transparent=true; scene.add(grid);

const root=new THREE.Group(); scene.add(root);

// ---- procedural leather material (built-in, no network) --------------------
// A repeating grain bump + subtle roughness variation so the leather reads as
// real material under the IBL. Custom PolyHaven/user maps can replace these.
let LEATHER_BUMP=null, LEATHER_ROUGH=null, LEATHER_TEX=null;
function leatherBump(){
  if(LEATHER_BUMP) return LEATHER_BUMP;
  const S=256, c=document.createElement("canvas"); c.width=c.height=S; const x=c.getContext("2d");
  x.fillStyle="#808080"; x.fillRect(0,0,S,S);
  // pebbled grain: many soft blobs, light and dark
  for(let i=0;i<3200;i++){
    const r=1+Math.random()*2.6, gx=Math.random()*S, gy=Math.random()*S;
    const v=128+(Math.random()*2-1)*72; x.fillStyle="rgba("+(v|0)+","+(v|0)+","+(v|0)+",0.32)";
    x.beginPath(); x.arc(gx,gy,r,0,6.283); x.fill();
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(6,6);
  LEATHER_BUMP=tex; return tex;
}
// Subtle roughness variation so specular highlights break up like real grain.
function leatherRough(){
  if(LEATHER_ROUGH) return LEATHER_ROUGH;
  const S=256, c=document.createElement("canvas"); c.width=c.height=S; const x=c.getContext("2d");
  x.fillStyle="#b0b0b0"; x.fillRect(0,0,S,S);
  for(let i=0;i<1400;i++){ const r=4+Math.random()*16, gx=Math.random()*S, gy=Math.random()*S;
    const v=150+(Math.random()*2-1)*70; x.fillStyle="rgba("+(v|0)+","+(v|0)+","+(v|0)+",0.22)";
    x.beginPath(); x.arc(gx,gy,r,0,6.283); x.fill(); }
  const tex=new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(4,4);
  LEATHER_ROUGH=tex; return tex;
}
// Finish presets — roughness + clearcoat sheen, from matte veg-tan to glossy patent.
const FINISHES={ matte:{roughness:0.85,clearcoat:0.04,ccRough:0.6},
                 satin:{roughness:0.58,clearcoat:0.22,ccRough:0.45},
                 glossy:{roughness:0.32,clearcoat:0.7,ccRough:0.12} };
let FINISH=FINISHES.satin;
function makeLeatherMaterial(hex){
  // MeshPhysicalMaterial = MeshStandard + a clearcoat layer for the leather sheen,
  // lit by the procedural studio environment. Flat shading keeps every rigid region
  // a clean plane and sharp folds crisp; rounded fillets read via the bump/normal +
  // env reflection. Crease lines are still drawn on top in edit mode.
  const m=new THREE.MeshPhysicalMaterial({
    color:hex, roughness:FINISH.roughness, metalness:0.0, side:THREE.DoubleSide,
    bumpMap:leatherBump(), bumpScale:0.22, roughnessMap:leatherRough(),
    clearcoat:FINISH.clearcoat, clearcoatRoughness:FINISH.ccRough,
    envMapIntensity:1.0, flatShading:true,
  });
  if(LEATHER_TEX){ m.map=LEATHER_TEX; m.color.setHex(0xffffff); }
  return m;
}
// Switch the leather finish on every panel (matte / satin / glossy).
window.setConstructFinish=function(name){
  FINISH=FINISHES[name]||FINISHES.satin;
  for(const p of PANELS){ if(p.mat){ p.mat.roughness=FINISH.roughness; p.mat.clearcoat=FINISH.clearcoat; p.mat.clearcoatRoughness=FINISH.ccRough; p.mat.needsUpdate=true; } }
};
// Custom leather albedo (a photo / seamless texture) tiled across every plain-leather
// panel; panels carrying artwork keep their own composited map. tiling = repeats per
// panel. Pass an empty url to clear back to the tinted procedural leather.
window.setConstructLeatherTexture=function(dataURL, tiling){
  tiling=(tiling>0?tiling:1);
  const apply=()=>{ for(const p of PANELS){ if(p.mat){
      p.mat.map=LEATHER_TEX||null; p.mat.color.setHex(LEATHER_TEX?0xffffff:MATERIAL_COLOR); p.mat.needsUpdate=true; } } };
  if(!dataURL){ if(LEATHER_TEX){ LEATHER_TEX.dispose(); LEATHER_TEX=null; } apply(); return; }
  const img=new Image();
  img.onload=function(){
    const tex=new THREE.Texture(img); tex.needsUpdate=true;
    tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(tiling,tiling);
    tex.encoding=THREE.sRGBEncoding; tex.anisotropy=4;
    if(LEATHER_TEX) LEATHER_TEX.dispose(); LEATHER_TEX=tex; apply();
  };
  img.src=dataURL;
};

// ---- model state ----------------------------------------------------------
let MODEL=null;           // {panels:[...], groundPanel}
let PANELS=[];            // per-panel runtime: {rest, X, edges, regions, tree, mesh, foldLine, wire}
let PANEL_BY_ID={};       // id -> panel
let CONTROLS={ groundPanel:0, foldAngle:{}, foldRound:{} };  // foldAngle["pid-fid"]=deg, foldRound=0..1
let BASE_PT={};           // panelId -> [x,y] base region point ("which side stays flat")
let USER_XF={};           // handle -> {t:[x,y,z], q:[x,y,z,w], s} pose override (move/rotate/scale)
let TOOL="select";
let needsPose=false, hudT=0;

// Stitch flagship state -----------------------------------------------------
let CHAINS=[];            // [{id, panelId, closed, holes:[{x,y,tri,bary}]}]
let CHAIN_BY_ID={};
let SEAMS=[];             // [{id, chainA, chainB, mode, pairs:[[a,b]], reversed}]
let GLUES=[];             // [{panelA, panelB}] — rigid weld where panel edges meet
let SHOW_THREAD=true;
let SELECTED_CHAIN=-1;    // chain the user has picked (first half of a stitch)
let CREASE_PT=null;       // first clicked point of a new fold being drawn in 3D
let creaseMark=null;      // marker dot for that first point
let creaseLine=null;      // rubber-band preview from the first point to the cursor
let SNAP_ENABLED=true;    // mirrors the 2D snap toggle (snapActive), pushed from Swift
let snapMark=null;        // live osnap indicator dot under the cursor (crease tool)
let holeMesh=null;        // InstancedMesh of all hole markers (rides the fold)
let chainLineMesh=null;   // LineSegments linking each chain's holes (always shown)
let STAMPS=[];            // decoration-stamp outlines [{panelId, closed, pts:[{tri,bary}]}]
let stampMesh=null;       // LineSegments of all stamp outlines (ride the fold)
let HOLE_SLOTS=[];        // per-instance {chainId, k} parallel to holeMesh
let threadGroup=new THREE.Group(); scene.add(threadGroup);
let seamReport=[];        // per-seam gap stats for the HUD

// Mockup material (Phase 4): leather colour + thickness (mm) for the shell.
let MATERIAL_COLOR=0x8a5a2b;
let THICKNESS=2.0;

const COL_GROUND=0x6b8caf, COL_FLAP=0xb98a5e, COL_FOLD=0xff7a1a, COL_WIRE=0x000000;
// Hole markers are a *tool* overlay, so they're high-contrast (orange) and light
// up cyan when their chain is picked — visible on any leather colour. The chain
// line links a run of holes so the seam reads even before it's stitched.
const COL_HOLE=0xff8c2b, COL_HOLE_SEL=0x35c1ff, COL_THREAD=0xf0e2c0, COL_CHAIN=0xffb066;
const _SPHERE=new THREE.SphereGeometry(1,10,8);   // unit sphere, scaled per hole
const _IDENT=new THREE.Matrix4();

function clearPanels(){
  for(const p of PANELS){
    if(p.decalMesh){ root.remove(p.decalMesh); p.decalMesh.geometry.dispose(); if(p.decalMesh.material.map) p.decalMesh.material.map.dispose(); p.decalMesh.material.dispose(); }
    if(p.mat && p.mat.map && p.mat.map!==LEATHER_TEX){ p.mat.map.dispose(); }   // base leather map (not the shared custom texture)
    if(p.shell){ root.remove(p.shell); p.shell.geometry.dispose(); }  // shares p.mat
    if(p.mesh){ root.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); }
    if(p.foldLine){ root.remove(p.foldLine); p.foldLine.geometry.dispose(); p.foldLine.material.dispose(); }
    if(p.wire){ root.remove(p.wire); p.wire.geometry.dispose(); p.wire.material.dispose(); }
  }
  PANELS=[]; PANEL_BY_ID={};
  if(holeMesh){ root.remove(holeMesh); holeMesh.geometry.dispose(); holeMesh.material.dispose(); holeMesh=null; }
  if(chainLineMesh){ root.remove(chainLineMesh); chainLineMesh.geometry.dispose(); chainLineMesh.material.dispose(); chainLineMesh=null; }
  if(stampMesh){ root.remove(stampMesh); stampMesh.geometry.dispose(); stampMesh.material.dispose(); stampMesh=null; }
  if(typeof detachGizmo==="function") detachGizmo();
  hoverPanelId=-1; if(typeof clearHoverLine==="function") clearHoverLine();   // stale hover refs gone
  if(typeof clearFoldHi==="function") clearFoldHi();
  DECALS={}; ART_IMG={}; DECAL_XF={};   // re-pushed fresh after the model reloads
  HOLE_SLOTS=[];
  clearThread();
}
function clearThread(){
  for(let i=threadGroup.children.length-1;i>=0;i--){ const c=threadGroup.children[i]; threadGroup.remove(c); c.geometry.dispose(); c.material.dispose(); }
}

// union-find ----------------------------------------------------------------
function makeUF(n){ const p=[...Array(n).keys()];
  function f(x){ while(p[x]!==x){ p[x]=p[p[x]]; x=p[x]; } return x; }
  return { find:f, union:(a,b)=>{ p[f(a)]=f(b); } };
}

// Partition a panel's faces into rigid regions separated by FOLD hinges, then
// build the fold tree (root = ground/base region) used for forward folding.
function buildRegions(panel, isGround, preferredPoint){
  const tris=panel.triangles, hinges=panel.hinges;
  const ekey=(a,b)=> a<b ? a+"_"+b : b+"_"+a;
  // fold edges (the cuts between regions) + their foldId
  const foldOf={};
  for(const h of hinges){ if(h.foldId>=0) foldOf[ekey(h.v0,h.v1)]=h.foldId; }
  // edge -> incident faces
  const edgeFaces={};
  tris.forEach((t,fi)=>{
    [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]].forEach(([a,b])=>{
      const k=ekey(a,b); (edgeFaces[k]||(edgeFaces[k]=[])).push(fi);
    });
  });
  // union faces across non-fold shared edges
  const uf=makeUF(tris.length);
  for(const k in edgeFaces){
    const fs=edgeFaces[k];
    if(fs.length===2 && foldOf[k]===undefined) uf.union(fs[0],fs[1]);
  }
  // regions
  const regOf=tris.map((_,fi)=>uf.find(fi));
  const regIds=[...new Set(regOf)];
  const idx=new Map(regIds.map((r,i)=>[r,i]));
  const region=regIds.map(()=>({faces:[], verts:new Set()}));
  tris.forEach((t,fi)=>{
    const r=idx.get(regOf[fi]); region[r].faces.push(fi);
    t.forEach(v=>region[r].verts.add(v));
  });
  // region graph from fold edges (regionA, regionB, foldId, sharedVerts)
  const radj=region.map(()=>[]);
  for(const k in edgeFaces){
    const fs=edgeFaces[k]; if(fs.length!==2 || foldOf[k]===undefined) continue;
    const ra=idx.get(regOf[fs[0]]), rb=idx.get(regOf[fs[1]]);
    if(ra===rb) continue;
    const [a,b]=k.split("_").map(Number);
    radj[ra].push({to:rb, foldId:foldOf[k], v:[a,b]});
    radj[rb].push({to:ra, foldId:foldOf[k], v:[a,b]});
  }
  // root = base region = the one touching the most fold lines (a box base hubs
  // all four flaps); ties broken by vertex count. Fold-degree (not size) matters
  // when base and flaps are equal-area, as in a box net.
  let rootR=0;
  for(let i=1;i<region.length;i++){
    const di=radj[i].length, dr=radj[rootR].length;
    if(di>dr || (di===dr && region[i].verts.size>region[rootR].verts.size)) rootR=i;
  }
  // User override: the region containing the clicked base point stays flat (root).
  if(preferredPoint){
    const P=preferredPoint;
    outer: for(let r=0;r<region.length;r++){
      for(const fi of region[r].faces){ const t=tris[fi];
        const bc=bary3([P[0],0,P[1]], [panel.v2d[t[0]][0],0,panel.v2d[t[0]][1]], [panel.v2d[t[1]][0],0,panel.v2d[t[1]][1]], [panel.v2d[t[2]][0],0,panel.v2d[t[2]][1]]);
        if(bc[0]>=-1e-3 && bc[1]>=-1e-3 && bc[2]>=-1e-3){ rootR=r; break outer; }
      }
    }
  }
  // BFS tree
  const parent=region.map(()=>-1), parentFold=region.map(()=>-1), parentVerts=region.map(()=>null);
  const order=[], seen=region.map(()=>false); seen[rootR]=true; const q=[rootR];
  while(q.length){ const r=q.shift(); order.push(r);
    for(const e of radj[r]) if(!seen[e.to]){ seen[e.to]=true; parent[e.to]=r; parentFold[e.to]=e.foldId; parentVerts[e.to]=collectFoldAxis(panel,e.foldId,region[e.to].verts); q.push(e.to); }
  }
  // subtree vertex sets (region + descendants)
  const children=region.map(()=>[]); for(let r=0;r<region.length;r++) if(parent[r]>=0) children[parent[r]].push(r);
  const subtree=region.map(()=>null);
  function buildSub(r){ const s=new Set(region[r].verts); for(const c of children[r]){ buildSub(c); subtree[c].forEach(v=>s.add(v)); } subtree[r]=s; }
  buildSub(rootR);
  return { region, regOf:tris.map((_,fi)=>idx.get(regOf[fi])), rootR, parent, parentFold, parentVerts, order, subtree, isGround };
}

// The fold axis between a child region and its parent: the two extreme vertices
// of that fold's hinge chain (a straight fold is collinear; a curved fold uses
// its chord, which the PBD relax pass then smooths into the developable curve).
function collectFoldAxis(panel, foldId, regionVerts){
  const pts=new Set();
  for(const h of panel.hinges){ if(h.foldId===foldId){ pts.add(h.v0); pts.add(h.v1); } }
  const arr=[...pts];
  // farthest pair (in rest space)
  let bi=0,bj=1,bd=-1;
  for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++){
    const a=panel.rest3[arr[i]], b=panel.rest3[arr[j]];
    const dd=(a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2;
    if(dd>bd){ bd=dd; bi=i; bj=j; }
  }
  return [arr[bi], arr[bj]];
}

// ---- load model -----------------------------------------------------------
window.loadConstructModel=function(jsonStr){
  let m; try{ m=JSON.parse(jsonStr); }catch(e){ post({op:"consoleError",message:"bad model json"}); return; }
  MODEL=m; clearPanels();
  for(const pj of (m.panels||[])){
    const rest3=pj.vertices.map(v=>[v[0],v[1],v[2]]);
    const _hnd=(pj.handle!=null?String(pj.handle):String(pj.id));
    const panel={ id:pj.id, handle:_hnd, triangles:pj.triangles, hinges:pj.hinges, rest3,
                  v2d:pj.vertices2d||pj.vertices.map(v=>[v[0],v[2]]),
                  patchOf:(pj.patchOf==null?-1:pj.patchOf),
                  userXf:(USER_XF[_hnd]?{t:USER_XF[_hnd].t.slice(),q:USER_XF[_hnd].q.slice(),s:USER_XF[_hnd].s}:{t:[0,0,0],q:[0,0,0,1],s:1}),
                  X:rest3.map(v=>v.slice()) };
    // unique edges + rest lengths (the inextensible "bars")
    const seen=new Set(), edges=[];
    for(const e of pj.edges){ const a=e[0],b=e[1],k=a<b?a+"_"+b:b+"_"+a; if(!seen.has(k)){ seen.add(k); edges.push([a,b, len(sub(rest3[a],rest3[b]))]); } }
    panel.edges=edges;
    panel.asm=null;        // assembly transform {R,t} set by the stitch solver
    panel.tree=buildRegions(panel, pj.id===(m.groundPanel||0), BASE_PT[panel.id]);
    // vertex adjacency + boundary (interior verts get crease-rounded; boundary
    // verts stay so the cut outline stays crisp).
    const nbr=panel.X.map(()=>new Set()), ec={};
    const ek=(a,b)=>a<b?a+"_"+b:b+"_"+a;
    for(const t of panel.triangles){ for(const [a,b] of [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]]){
      nbr[a].add(b); nbr[b].add(a); const k=ek(a,b); ec[k]=(ec[k]||0)+1; } }
    panel.nbr=nbr.map(s=>[...s]);
    const bnd=new Set(), bedges=[];
    for(const k in ec){ if(ec[k]===1){ const [a,b]=k.split("_").map(Number); bnd.add(a); bnd.add(b); bedges.push([a,b]); } }
    panel.boundary=bnd; panel.boundaryEdges=bedges;
    buildPanelMeshes(panel);
    PANELS.push(panel); PANEL_BY_ID[panel.id]=panel;
  }
  CONTROLS.groundPanel = m.groundPanel||0;
  buildHoleChains(m.holeChains||[]);
  // Pose once (flat) so the meshes have real positions, then frame the camera.
  recomputePose(); recenterCamera();
};

// Build the sewing-hole markers (one InstancedMesh; each instance rides its
// panel's mesh via the stored barycentric weights so holes follow every fold).
function buildHoleChains(chains){
  CHAINS=chains; CHAIN_BY_ID={}; HOLE_SLOTS=[];
  let total=0;
  for(const c of chains){ CHAIN_BY_ID[c.id]=c; total+=c.holes.length; }
  if(holeMesh){ root.remove(holeMesh); holeMesh.geometry.dispose(); holeMesh.material.dispose(); holeMesh=null; }
  if(chainLineMesh){ root.remove(chainLineMesh); chainLineMesh.geometry.dispose(); chainLineMesh.material.dispose(); chainLineMesh=null; }
  if(total===0) return;
  // marker radius from a typical pitch — bigger than before so the holes are
  // unmistakable (users reported not being able to see them at all).
  let pitch=0; let np=0; for(const c of chains){ if(c.pitch){ pitch+=c.pitch; np++; } }
  pitch = np? pitch/np : 4; const rad=Math.max(1.1, Math.min(pitch*0.34, 3.2));
  // Unlit (MeshBasic) + base white so the per-instance colour reads true and the
  // markers stay bright regardless of scene lighting / leather colour.
  const mat=new THREE.MeshBasicMaterial({color:0xffffff});
  holeMesh=new THREE.InstancedMesh(_SPHERE, mat, total);
  holeMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  holeMesh.userData.rad=rad;
  let s=0;
  for(const c of chains){ for(let k=0;k<c.holes.length;k++){ HOLE_SLOTS.push({chainId:c.id, k}); s++; } }
  root.add(holeMesh);
  // color buffer so a picked chain can light up
  holeMesh.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(total*3), 3);
  for(let i=0;i<total;i++) holeMesh.setColorAt(i, new THREE.Color(COL_HOLE));
}

// World position of hole k on a chain = barycentric blend of its triangle's
// three (already folded + assembly-transformed) panel vertices.
function holeWorld(chain, k){
  const h=chain.holes[k]; const p=PANEL_BY_ID[chain.panelId];
  if(!p) return [h.x,0,h.y];
  const t=p.triangles[h.tri]; if(!t) return [h.x,0,h.y];
  const A=p.X[t[0]], B=p.X[t[1]], C=p.X[t[2]], w=h.bary;
  return [A[0]*w[0]+B[0]*w[1]+C[0]*w[2],
          A[1]*w[0]+B[1]*w[1]+C[1]*w[2],
          A[2]*w[0]+B[2]*w[1]+C[2]*w[2]];
}

function buildPanelMeshes(panel){
  const n=panel.X.length;
  const pos=new Float32Array(n*3);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
  const idx=[]; for(const t of panel.triangles){ idx.push(t[0],t[1],t[2]); }
  geo.setIndex(idx);
  geo.setAttribute("uv", new THREE.BufferAttribute(panelUVs(panel),2));  // for artwork map
  const mat=makeLeatherMaterial(MATERIAL_COLOR);
  const mesh=new THREE.Mesh(geo,mat); mesh.userData.panelId=panel.id;
  mesh.castShadow=true; mesh.receiveShadow=true;
  root.add(mesh); panel.mesh=mesh; panel.mat=mat;

  // Thickness shell: a bottom surface (reversed) + a rim band around the
  // boundary, offset along the surface normal by the material thickness, so the
  // leather reads as solid with a real edge. Rebuilt with the surface each pose.
  const N=panel.X.length, sidx=[];
  for(const t of panel.triangles) sidx.push(N+t[0], N+t[2], N+t[1]);   // underside, reversed
  for(const [a,b] of panel.boundaryEdges){ sidx.push(a, b, N+b); sidx.push(a, N+b, N+a); }  // rim quads
  const sgeo=new THREE.BufferGeometry();
  sgeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(N*2*3),3));
  sgeo.setIndex(sidx);
  panel.shell=new THREE.Mesh(sgeo, mat); panel.shell.castShadow=true; panel.shell.receiveShadow=true;
  root.add(panel.shell);

  // Clean panel outline (boundary edges only) — not the full triangulation, which
  // read as jagged busywork. This + the crease lines = a crisp CAD wireframe.
  const wpos=new Float32Array(Math.max(panel.boundaryEdges.length,1)*2*3);
  const wgeo=new THREE.BufferGeometry(); wgeo.setAttribute("position", new THREE.BufferAttribute(wpos,3));
  panel.wire=new THREE.LineSegments(wgeo, new THREE.LineBasicMaterial({color:COL_WIRE, transparent:true, opacity:0.35}));
  panel.wire.renderOrder=1;
  root.add(panel.wire);

  // fold edges = crisp crease lines, drawn on top; also picked (userData.segs→foldId)
  const fsegs=[]; const segMeta=[];
  for(const h of panel.hinges){ if(h.foldId>=0){ fsegs.push([h.v0,h.v1]); segMeta.push({panelId:panel.id, foldId:h.foldId}); } }
  panel.foldSegs=fsegs;
  const fpos=new Float32Array(Math.max(fsegs.length,1)*2*3);
  const fgeo=new THREE.BufferGeometry(); fgeo.setAttribute("position", new THREE.BufferAttribute(fpos,3));
  panel.foldLine=new THREE.LineSegments(fgeo, new THREE.LineBasicMaterial({color:COL_FOLD}));
  panel.foldLine.renderOrder=2;
  panel.foldLine.userData.segs=segMeta; panel.foldLine.userData.panelId=panel.id;
  root.add(panel.foldLine);
}

// ---- Kabsch rigid alignment (Horn quaternion, Jacobi 4x4 eigensolve) -------
// The "shift + rotate so one seam lands over the other." Given matched hole
// pairs, it returns the rotation+translation that best seats the moving panel's
// seam onto the fixed one — no stretching, just a rigid move.
function quatToMat(q){
  let w=q[0],x=q[1],y=q[2],z=q[3]; const n=Math.hypot(w,x,y,z)||1; w/=n;x/=n;y/=n;z/=n;
  return [1-2*(y*y+z*z), 2*(x*y-z*w),   2*(x*z+y*w),
          2*(x*y+z*w),   1-2*(x*x+z*z), 2*(y*z-x*w),
          2*(x*z-y*w),   2*(y*z+x*w),   1-2*(x*x+y*y)];
}
function largestEigenvector4(A){
  const n=4, a=A.map(r=>r.slice());

  for(let sweep=0; sweep<100; sweep++){
    let off=0; for(let i=0;i<n;i++) for(let j=i+1;j<n;j++) off+=a[i][j]*a[i][j];
    if(off<1e-20) break;
    for(let p=0;p<n;p++) for(let q=p+1;q<n;q++){
      if(Math.abs(a[p][q])<1e-18) continue;
      const theta=(a[q][q]-a[p][p])/(2*a[p][q]);
      const denom=Math.abs(theta)+Math.sqrt(theta*theta+1);
      const t=(theta>=0?1:-1)/denom, c=1/Math.sqrt(t*t+1), s=t*c;
      const apq=a[p][q];
      a[p][p]-=t*apq; a[q][q]+=t*apq; a[p][q]=0; a[q][p]=0;
      for(let k=0;k<n;k++){
        if(k!==p && k!==q){
          const akp=a[k][p], akq=a[k][q];
          a[k][p]=c*akp - s*akq; a[p][k]=a[k][p];
          a[k][q]=s*akp + c*akq; a[q][k]=a[k][q];
        }
        const vkp=V[k][p], vkq=V[k][q];
        V[k][p]=c*vkp - s*vkq; V[k][q]=s*vkp + c*vkq;

  for(let i=1;i<n;i++){ if(a[i][i]>bv){ bv=a[i][i]; best=i; } }
  return [V[0][best],V[1][best],V[2][best],V[3][best]];
}
function kabsch(src,dst){
  const n=Math.min(src.length,dst.length); if(n<1) return null;
  let cs=[0,0,0], cd=[0,0,0];
  for(let i=0;i<n;i++){ cs=add(cs,src[i]); cd=add(cd,dst[i]); }
  cs=scl(cs,1/n); cd=scl(cd,1/n);
  let Sxx=0,Sxy=0,Sxz=0,Syx=0,Syy=0,Syz=0,Szx=0,Szy=0,Szz=0;
  for(let i=0;i<n;i++){
    const a=sub(src[i],cs), b=sub(dst[i],cd);
    Sxx+=a[0]*b[0]; Sxy+=a[0]*b[1]; Sxz+=a[0]*b[2];
    Syx+=a[1]*b[0]; Syy+=a[1]*b[1]; Syz+=a[1]*b[2];
    Szx+=a[2]*b[0]; Szy+=a[2]*b[1]; Szz+=a[2]*b[2];
  }
  const N=[
    [Sxx+Syy+Szz, Syz-Szy,      Szx-Sxz,      Sxy-Syx],
    [Syz-Szy,     Sxx-Syy-Szz,  Sxy+Syx,      Szx+Sxz],
    [Szx-Sxz,     Sxy+Syx,     -Sxx+Syy-Szz,  Syz+Szy],
    [Sxy-Syx,     Szx+Sxz,      Syz+Szy,     -Sxx-Syy+Szz]];
  const R=quatToMat(largestEigenvector4(N));
  const t=[ cd[0]-(R[0]*cs[0]+R[1]*cs[1]+R[2]*cs[2]),
            cd[1]-(R[3]*cs[0]+R[4]*cs[1]+R[5]*cs[2]),
            cd[2]-(R[6]*cs[0]+R[7]*cs[1]+R[8]*cs[2]) ];
  return {R, t};
}
function applyRigidInPlace(panel, R, t){
  for(const x of panel.X){
    const rx=R[0]*x[0]+R[1]*x[1]+R[2]*x[2]+t[0];
    const ry=R[3]*x[0]+R[4]*x[1]+R[5]*x[2]+t[1];
    const rz=R[6]*x[0]+R[7]*x[1]+R[8]*x[2]+t[2];
    x[0]=rx; x[1]=ry; x[2]=rz;
  }
}

// ---- stitch solve: seat moving panels onto fixed ones, then couple ---------
function seamPairs(seam, ca, cb){
  if(seam.mode==="oneToOne" || !(seam.pairs && seam.pairs.length)){
    const n=Math.min(ca.holes.length, cb.holes.length), p=[];
    for(let i=0;i<n;i++) p.push([i,i]); return p;
  }
  return seam.pairs;
}
function measureSeam(seam, fixed, fIdxKey, moving, mIdxKey, pairs){
  let mx=0, sum=0, n=0;
  for(const pr of pairs){
    const g=len(sub(holeWorld(fixed, pr[fIdxKey]), holeWorld(moving, pr[mIdxKey])));
    if(g>mx) mx=g; sum+=g; n++;

  return {id:(seam&&seam.id)||"", maxGap:mx, meanGap:n?sum/n:0,
          nA:fixed.holes.length, nB:moving.holes.length};
}
// Finished size (folded bbox) + flat leather area → Swift, for the readouts panel.
let lastReadoutJSON="";
function postReadouts(){
  if(!PANELS.length){ return; }
  let mnx=1e18,mny=1e18,mnz=1e18,mxx=-1e18,mxy=-1e18,mxz=-1e18, area=0;
  for(const p of PANELS){
    for(const v of p.X){ if(v[0]<mnx)mnx=v[0]; if(v[1]<mny)mny=v[1]; if(v[2]<mnz)mnz=v[2]; if(v[0]>mxx)mxx=v[0]; if(v[1]>mxy)mxy=v[1]; if(v[2]>mxz)mxz=v[2]; }
    for(const t of p.triangles){ const A=p.v2d[t[0]],B=p.v2d[t[1]],C=p.v2d[t[2]];
      area += Math.abs((B[0]-A[0])*(C[1]-A[1])-(C[0]-A[0])*(B[1]-A[1]))*0.5; }
  }
  const r={ w:+(mxx-mnx).toFixed(1), h:+(mxy-mny).toFixed(1), d:+(mxz-mnz).toFixed(1),
            area:+area.toFixed(0), panels:PANELS.length };
  const j=JSON.stringify(r);
  if(j!==lastReadoutJSON){ lastReadoutJSON=j; post({op:"readouts", r:r}); }
}
// Push per-seam fit (gap after seating + hole counts) to Swift, only when it
// actually moves — this is the data behind the inspector's fit verdict.
let lastSeamFitJSON="";
function postSeamFit(){
  const arr=seamReport.map(r=>({id:r.id, maxGap:+r.maxGap.toFixed(3),
                                meanGap:+r.meanGap.toFixed(3), nA:r.nA, nB:r.nB}));
  const j=JSON.stringify(arr);
  if(j!==lastSeamFitJSON){ lastSeamFitJSON=j; post({op:"seamFit", seams:arr}); }
}
// Non-rigid "deform / ease": gently pull the moving panel's seam holes onto the
// fixed targets (each hole tugs its triangle's verts), then re-satisfy the bars
// so the panel puckers to fit without stretching — exactly easing a longer seam.
function deformSeam(fixed, fIdxKey, moving, mIdxKey, mp, pairs){
  const alpha=0.5, iters=6;
  for(let it=0; it<iters; it++){
    for(const pr of pairs){
      const target=holeWorld(fixed, pr[fIdxKey]);
      const h=moving.holes[pr[mIdxKey]]; const tri=mp.triangles[h.tri]; if(!tri) continue;
      const d=sub(target, holeWorld(moving, pr[mIdxKey]));
      for(let c=0;c<3;c++){ const vi=tri[c], wc=h.bary[c]*alpha;
        mp.X[vi][0]+=d[0]*wc; mp.X[vi][1]+=d[1]*wc; mp.X[vi][2]+=d[2]*wc; }
    }
    for(let r=0;r<4;r++) for(const e of mp.edges){
      const a=e[0],b=e[1],rest=e[2];
      const dx=sub(mp.X[b],mp.X[a]); const dd=len(dx)||1e-9; const s=0.5*(dd-rest)/dd; const cx=scl(dx,s);
      mp.X[a][0]+=cx[0]; mp.X[a][1]+=cx[1]; mp.X[a][2]+=cx[2];
      mp.X[b][0]-=cx[0]; mp.X[b][1]-=cx[1]; mp.X[b][2]-=cx[2];
    }
  }
}
function solveStitches(){
  for(const p of PANELS) p.asm=null;
  seamReport=[];
  const ground=CONTROLS.groundPanel;
  for(const seam of SEAMS){
    const ca=CHAIN_BY_ID[seam.chainA], cb=CHAIN_BY_ID[seam.chainB];
    if(!ca||!cb) continue;
    const pairs=seamPairs(seam, ca, cb);
    // pairs are [aIdxInChainA, bIdxInChainB]; A is fixed, B moves by default.
    let fixed=ca, moving=cb, fKey=0, mKey=1;
    if(cb.panelId===ground && ca.panelId!==ground){ fixed=cb; moving=ca; fKey=1; mKey=0; }
    if(fixed.panelId===moving.panelId){
      // same-panel corner seam — the two runs already meet once folded
      seamReport.push(measureSeam(seam,fixed,fKey,moving,mKey,pairs)); continue;
    }
    const mp=PANEL_BY_ID[moving.panelId]; if(!mp) continue;
    const src=[], dst=[];
    for(const pr of pairs){ dst.push(holeWorld(fixed, pr[fKey])); src.push(holeWorld(moving, pr[mKey])); }
    const RT=kabsch(src,dst);
    if(RT) applyRigidInPlace(mp, RT.R, RT.t);
    // Ease/gather (default) is LOSSLESS: rigid seating only, the excess length
    // gathers as thread that converges many holes onto fewer — 0% stretch. Only
    // Deform-to-Fit actually compresses/stretches the panel so holes meet 1:1.
    if(seam.mode==="deform") deformSeam(fixed,fKey,moving,mKey,mp,pairs);
    seamReport.push(measureSeam(seam,fixed,fKey,moving,mKey,pairs));
  }
  // Glue (weld): seat panel B onto panel A along their *closest* boundary run —
  // exactly mating a glue tab to the panel it's glued onto. Rigid, no thread.
  for(const g of GLUES){
    let A=g.panelA, B=g.panelB, aPt=g.aPt, bPt=g.bPt;
    if(B===ground && A!==ground){ const t=A; A=B; B=t; const tp=aPt; aPt=bPt; bPt=tp; }
    const pa=PANEL_BY_ID[A], pb=PANEL_BY_ID[B]; if(!pa||!pb||A===B) continue;
    const mode=g.mode||"panel";
    if(mode==="face") seatFaceGlue(pa, pb, aPt, bPt);
    else if(mode==="edge") seatEdgeGlue(pa, pb, aPt, bPt);
    else seatPanelGlue(pa, pb);
  }
}
// Panel glue: seat B onto A along their closest boundary run (general catch-all).
function seatPanelGlue(pa, pb){
  const ba=[...pa.boundary], bb=[...pb.boundary]; if(!ba.length||!bb.length) return;
  const pairs=[];
  for(const j of bb){ let bi=-1,bd=1e18; for(const i of ba){ const d=len(sub(pb.X[j],pa.X[i])); if(d<bd){ bd=d; bi=i; } } pairs.push([bi,j,bd]); }
  pairs.sort((x,y)=>x[2]-y[2]);
  const keep=pairs.slice(0, Math.max(3, Math.floor(pairs.length*0.4)));
  const src=keep.map(p=>pb.X[p[1]].slice()), dst=keep.map(p=>pa.X[p[0]].slice());
  const RT=kabsch(src,dst); if(RT) applyRigidInPlace(pb, RT.R, RT.t);
}
// Which region of a panel contains a 2D point (else null).
function regionOfPoint(panel, p2d){
  if(!p2d || !panel.tree) return null;
  for(const reg of panel.tree.region){ for(const fi of reg.faces){ const t=panel.triangles[fi];
    const bc=bary3([p2d[0],0,p2d[1]], [panel.v2d[t[0]][0],0,panel.v2d[t[0]][1]], [panel.v2d[t[1]][0],0,panel.v2d[t[1]][1]], [panel.v2d[t[2]][0],0,panel.v2d[t[2]][1]]);
    if(bc[0]>=-1e-3&&bc[1]>=-1e-3&&bc[2]>=-1e-3) return reg; } }
  return null;
}
function regionPlane(panel, reg){
  let c=[0,0,0],n=0; reg.verts.forEach(v=>{ c=add(c,panel.X[v]); n++; }); c=scl(c,1/Math.max(n,1));
  const t0=panel.triangles[reg.faces[0]]; const A=panel.X[t0[0]],B=panel.X[t0[1]],C=panel.X[t0[2]];
  return { c, n:norm(cross(sub(B,A),sub(C,A))) };
}
function nearestBoundaryEdge(panel, p2d){
  if(!p2d) return null; let best=null, bd=1e18;

    const d=(m[0]-p2d[0])**2+(m[1]-p2d[1])**2; if(d<bd){ bd=d; best=[a,b]; } }

}
// Shortest-arc quaternion rotating unit a → unit b.
function quatFromTo(a,b){
  const d=dot(a,b);
  if(d>0.999999) return [0,0,0,1];
  if(d<-0.999999){ let ax=cross([1,0,0],a); if(len(ax)<1e-6) ax=cross([0,1,0],a); ax=norm(ax); return [ax[0],ax[1],ax[2],0]; }
  const c=cross(a,b); const w=1+d; const l=Math.hypot(c[0],c[1],c[2],w)||1; return [c[0]/l,c[1]/l,c[2]/l,w/l];
}
// Face glue: lay B's chosen face flat on A's chosen face (planes coincident,
// normals opposed, offset by thickness) — "glue the two planes together".
function seatFaceGlue(pa, pb, aPt, bPt){
  const rA=regionOfPoint(pa,aPt)||(pa.tree&&pa.tree.region[pa.tree.rootR]);
  const rB=regionOfPoint(pb,bPt)||(pb.tree&&pb.tree.region[pb.tree.rootR]); if(!rA||!rB) return seatPanelGlue(pa,pb);
  const PA=regionPlane(pa,rA), PB=regionPlane(pb,rB);
  const q=quatFromTo(PB.n, scl(PA.n,-1));
  for(const v of pb.X){ const r=qrot(q,sub(v,PB.c)); v[0]=PB.c[0]+r[0]; v[1]=PB.c[1]+r[1]; v[2]=PB.c[2]+r[2]; }
  const target=add(PA.c, scl(PA.n, THICKNESS)); const d=sub(target, PB.c);
  for(const v of pb.X){ v[0]+=d[0]; v[1]+=d[1]; v[2]+=d[2]; }
}
// Edge glue: align B's chosen boundary edge onto A's, panels continuing in the
// same surface direction (Kabsch on the two endpoints + a normal-direction point).
function seatEdgeGlue(pa, pb, aPt, bPt){
  const eA=nearestBoundaryEdge(pa,aPt), eB=nearestBoundaryEdge(pb,bPt); if(!eA||!eB) return seatPanelGlue(pa,pb);
  const A0=pa.X[eA[0]],A1=pa.X[eA[1]], B0=pb.X[eB[0]],B1=pb.X[eB[1]];
  const rA=regionOfPoint(pa,aPt), rB=regionOfPoint(pb,bPt);
  const nA=rA?regionPlane(pa,rA).n:[0,1,0], nB=rB?regionPlane(pb,rB).n:[0,1,0];
  const mA=scl(add(A0,A1),0.5), mB=scl(add(B0,B1),0.5);

  const RT=kabsch(src,dst); if(RT) applyRigidInPlace(pb, RT.R, RT.t);

// ---- pose: forward fold (rigid origami) + PBD relax, then stitch solve ------
function foldPanel(panel){
  const T=panel.tree;
  // start from flat rest
  for(let i=0;i<panel.X.length;i++){ const r=panel.rest3[i]; panel.X[i][0]=r[0]; panel.X[i][1]=r[1]; panel.X[i][2]=r[2]; }
  // Forward-fold each non-root region about its parent fold, in BFS order. Each
  // fold is a developable BEND: at roundness 0 it's an exact rigid (knife-sharp)
  // rotation of the subtree; with roundness it becomes a true circular fillet on
  // the child side while the parent/base stays perfectly flat — a real radius,
  // zero stretch (the perpendicular profile is arc-length-preserving and the
  // along-hinge coordinate is untouched). The far field is the same rigid rotation,
  // just translated by the arc, so descendant folds keep composing correctly.
  for(const r of T.order){
    if(T.parent[r]<0) continue;
    const fid=T.parentFold[r];
    const key=panel.id+"-"+fid;
    let deg=CONTROLS.foldAngle[key]||0; if(!deg) continue;
    const A=deg*Math.PI/180; if(Math.abs(A)<1e-6) continue;
    const ax=T.parentVerts[r]; if(!ax) continue;
    const o=panel.X[ax[0]];
    let u=norm(sub(panel.X[ax[1]], o));        // hinge axis (in current/folded space)
    const sub_=T.subtree[r];
    // lift sign: orient u so +deg sends the subtree up (+y), matching the slider.
    let cen=[0,0,0],cn=0; sub_.forEach(v=>{ cen=add(cen,panel.X[v]); cn++; }); cen=scl(cen,1/Math.max(cn,1));
    if(rotAbout(cen,o,u,0.05)[1]-cen[1] < 0) u=scl(u,-1);
    // a = in-plane perpendicular toward the child region; n = u×a is the lift normal,
    // so a small +rotation about u sends a→cos·a+sin·n (matches the rigid fold).
    let aDir=sub(cen,o); aDir=sub(aDir, scl(u, dot(aDir,u)));
    const al=len(aDir); aDir = al<1e-9 ? [1,0,0] : scl(aDir,1/al);
    const nDir=norm(cross(u,aDir));
    // Fillet band: roundness consumes a strip of width W of the child region's
    // material next to the hinge; r = W/|A| is the true bend radius.
    const round=(CONTROLS.foldRound&&CONTROLS.foldRound[key])||0;
    let dmax=0; for(const v of T.region[r].verts){ const d=dot(sub(panel.X[v],o),aDir); if(d>dmax) dmax=d; }
    const W = round>0 ? round*dmax*0.8 : 0;
    const WA = W/A, cosA=Math.cos(A), sinA=Math.sin(A);
    const Epa = WA*sinA, Epn = WA*(1-cosA);    // arc end-point (→ 0 when W=0 ⇒ rigid)
    for(const v of sub_){
      const rel=sub(panel.X[v],o);
      const along=dot(rel,u), d=dot(rel,aDir);
      let pa, pn;
      if(W>0 && d>0 && d<W){ const th=A*(d/W); pa=WA*Math.sin(th); pn=WA*(1-Math.cos(th)); }
      else if(d<=0){ pa=d; pn=0; }
      else { pa=Epa+(d-W)*cosA; pn=Epn+(d-W)*sinA; }
      panel.X[v][0]=o[0]+along*u[0]+pa*aDir[0]+pn*nDir[0];
      panel.X[v][1]=o[1]+along*u[1]+pa*aDir[1]+pn*nDir[1];
      panel.X[v][2]=o[2]+along*u[2]+pa*aDir[2]+pn*nDir[2];
    }
  }
  // PBD distance relax: keep the root region (base / pinned ground) anchored;
  // project every bar to rest length so curved folds settle without stretching.
  // The same inextensible-bar solver the stitch coupling above reuses.
  const pinned=new Set();
  T.region[T.rootR].verts.forEach(v=>pinned.add(v));
  for(let it=0; it<10; it++){
    for(const [a,b,rest] of panel.edges){
      const wa=pinned.has(a)?0:1, wb=pinned.has(b)?0:1; const wsum=wa+wb; if(wsum===0) continue;
      const dx=sub(panel.X[b],panel.X[a]); const d=len(dx)||1e-9; const s=(d-rest)/d;
      const ca=scl(dx, (wa/wsum)*s), cb=scl(dx, (wb/wsum)*s);
      if(wa){ panel.X[a][0]+=ca[0]; panel.X[a][1]+=ca[1]; panel.X[a][2]+=ca[2]; }
      if(wb){ panel.X[b][0]-=cb[0]; panel.X[b][1]-=cb[1]; panel.X[b][2]-=cb[2]; }
    }
  }
}
// Rotate vector v by quaternion q [x,y,z,w].
function qrot(q,v){
  const x=q[0],y=q[1],z=q[2],w=q[3];
  const ix=w*v[0]+y*v[2]-z*v[1], iy=w*v[1]+z*v[0]-x*v[2], iz=w*v[2]+x*v[1]-y*v[0], iw=-x*v[0]-y*v[1]-z*v[2];
  return [ix*w+iw*-x+iy*-z-iz*-y, iy*w+iw*-y+iz*-x-ix*-z, iz*w+iw*-z+ix*-y-iy*-x];
}
function centroidX(panel){ let c=[0,0,0]; for(const v of panel.X){ c[0]+=v[0];c[1]+=v[1];c[2]+=v[2]; } const n=panel.X.length||1; return [c[0]/n,c[1]/n,c[2]/n]; }
// Bake a panel's user pose override (move/rotate/scale about its seated centroid)
// into panel.X, so the mesh, holes, seams, stamps and export all ride it.
function applyUserXf(panel){
  panel.seatCentroid=centroidX(panel);            // pre-override centroid (for the gizmo)
  const xf=panel.userXf; if(!xf) return;
  const idT=(xf.t[0]===0&&xf.t[1]===0&&xf.t[2]===0), idQ=(xf.q[0]===0&&xf.q[1]===0&&xf.q[2]===0&&Math.abs(xf.q[3]-1)<1e-9), idS=Math.abs(xf.s-1)<1e-9;
  if(idT&&idQ&&idS) return;
  const c=panel.seatCentroid, s=xf.s;
  for(const v of panel.X){
    const r=qrot(xf.q,[(v[0]-c[0])*s,(v[1]-c[1])*s,(v[2]-c[2])*s]);
    v[0]=c[0]+r[0]+xf.t[0]; v[1]=c[1]+r[1]+xf.t[1]; v[2]=c[2]+r[2]+xf.t[2];
  }
}
// Extract each rigid region's boundary loops (outer + any cut-out holes) as 3D
// world polygons + a planar normal — the input for per-region solid export.
function regionLoops(panel, region){
  const ekey=(a,b)=>a<b?a+"_"+b:b+"_"+a;
  const ec={};
  for(const fi of region.faces){ const t=panel.triangles[fi];
    for(const [a,b] of [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]]){ const k=ekey(a,b); ec[k]=(ec[k]||0)+1; } }
  const adj={};
  for(const k in ec){ if(ec[k]===1){ const [a,b]=k.split("_").map(Number); (adj[a]||(adj[a]=[])).push(b); (adj[b]||(adj[b]=[])).push(a); } }
  const used=new Set(), loops=[];
  for(const start in adj){ const s=+start; if((adj[s]||[]).every(n=>used.has(ekey(s,n)))) continue;
    const loop=[s]; let prev=-1, cur=s, guard=0;
    while(guard++<100000){
      let nx=-1; for(const n of adj[cur]||[]){ if(n!==prev && !used.has(ekey(cur,n))){ nx=n; break; } }
      if(nx<0) break; used.add(ekey(cur,nx)); if(nx===s) break; loop.push(nx); prev=cur; cur=nx;
    }
    if(loop.length>=3) loops.push(loop);
  }
  if(!loops.length) return null;
  const polys=loops.map(L=>L.map(i=>[panel.X[i][0],panel.X[i][1],panel.X[i][2]]));
  // outer = largest projected area; rest are holes
  function area2(P){ let a=0; for(let i=0;i<P.length;i++){ const p=P[i], q=P[(i+1)%P.length]; a+=p[0]*q[2]-q[0]*p[2]; } return Math.abs(a); }
  polys.sort((A,B)=>area2(B)-area2(A));
  const t0=panel.triangles[region.faces[0]]; const A=panel.X[t0[0]],B=panel.X[t0[1]],C=panel.X[t0[2]];
  return { outer:polys[0], holes:polys.slice(1), normal:norm(cross(sub(B,A),sub(C,A))) };
}
// All regions across all panels as solids-to-be (loops + normal), + thickness.
window.gatherConstructExport=function(){
  const regs=[];
  for(const p of PANELS){ if(!p.tree) continue;
    for(const region of p.tree.region){ const r=regionLoops(p, region); if(r && r.outer.length>=3) regs.push(r); } }
  return JSON.stringify({ regions:regs, thickness:THICKNESS });
};
function recomputePose(){
  for(const panel of PANELS) foldPanel(panel);   // each panel folds kinematically (rounded fillets included)
  solveStitches();                                // seat & sew panels together
  // Raised patches sit just above their container (re-applied each pose, so no
  // drift). World-up offset reads right for the common flat-area pocket case.
  for(const panel of PANELS){ if(panel.patchOf>=0){ const dy=THICKNESS*1.5+0.4; for(const v of panel.X){ v[1]+=dy; } } }
  for(const panel of PANELS) applyUserXf(panel);  // Blender-style move/rotate/scale override
  for(const panel of PANELS) writePanelGeometry(panel);
  updateHoleInstances();
  updateChainLines();
  updateStamps();
  updateThread();
  reportStretch();
  postSeamFit();
  postReadouts();
  if(typeof applyRenderMode==="function") applyRenderMode();   // re-hide overlays in mockup
  if(typeof updateFoldHi==="function") updateFoldHi();         // fold-side tint rides the pose
  // Keep the gizmo on its panel as the pose changes (but never while dragging it).
  if(gizmoPanel && gizmoPanel.seatCentroid && !tcontrols.dragging){
    const c=gizmoPanel.seatCentroid, xf=gizmoPanel.userXf;
    gizmoProxy.position.set(c[0]+xf.t[0], c[1]+xf.t[1], c[2]+xf.t[2]);
    gizmoProxy.quaternion.set(xf.q[0],xf.q[1],xf.q[2],xf.q[3]);
    gizmoProxy.scale.setScalar(xf.s||1); gizmoProxy.userData.centroid=c;
  }
}

// ---- hole markers + thread (ride the live folded mesh) ---------------------
function updateHoleInstances(){
  if(!holeMesh) return;
  const rad=holeMesh.userData.rad, m=new THREE.Matrix4(), col=new THREE.Color();
  for(let i=0;i<HOLE_SLOTS.length;i++){
    const slot=HOLE_SLOTS[i], c=CHAIN_BY_ID[slot.chainId]; if(!c) continue;
    const w=holeWorld(c, slot.k);
    m.makeScale(rad,rad,rad); m.setPosition(w[0],w[1],w[2]); holeMesh.setMatrixAt(i, m);
    col.setHex(slot.chainId===SELECTED_CHAIN ? COL_HOLE_SEL : COL_HOLE); holeMesh.setColorAt(i, col);
  }
  holeMesh.instanceMatrix.needsUpdate=true;
  if(holeMesh.instanceColor) holeMesh.instanceColor.needsUpdate=true;
}
// A faint poly-line through each chain's holes, always on, so a "run of holes"
// reads as a stitch line you can aim at — even before it's stitched. Rebuilt each
// pose (cheap: a handful of segments) so it rides the fold with the markers.
function updateChainLines(){
  if(chainLineMesh){ root.remove(chainLineMesh); chainLineMesh.geometry.dispose(); chainLineMesh.material.dispose(); chainLineMesh=null; }
  if(!CHAINS.length) return;
  const pos=[], colArr=[], sel=new THREE.Color(COL_HOLE_SEL), base=new THREE.Color(COL_CHAIN);
  for(const c of CHAINS){
    const n=c.holes.length; if(n<2) continue;
    const col=(c.id===SELECTED_CHAIN)?sel:base;
    const last=c.closed?n:n-1;
    for(let k=0;k<last;k++){
      const a=holeWorld(c,k), b=holeWorld(c,(k+1)%n);
      pos.push(a[0],a[1],a[2], b[0],b[1],b[2]);
      colArr.push(col.r,col.g,col.b, col.r,col.g,col.b);
    }
  }
  if(!pos.length) return;
  const g=new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute("color", new THREE.Float32BufferAttribute(colArr,3));
  chainLineMesh=new THREE.LineSegments(g, new THREE.LineBasicMaterial({vertexColors:true, transparent:true, opacity:0.85}));
  chainLineMesh.renderOrder=3; root.add(chainLineMesh);
}
// World position of an embedded point {tri,bary} on a panel's folded mesh.
function embeddedWorld(panel, pt){
  const t=panel.triangles[pt.tri]; if(!t) return [0,0,0];
  const A=panel.X[t[0]], B=panel.X[t[1]], C=panel.X[t[2]], w=pt.bary;
  return [A[0]*w[0]+B[0]*w[1]+C[0]*w[2],
          A[1]*w[0]+B[1]*w[1]+C[1]*w[2],
          A[2]*w[0]+B[2]*w[1]+C[2]*w[2]];
}
// Decoration stamps: each engulfed outline embedded in its outer panel's mesh,
// drawn as a surface line that rides the fold (visual-only, never cut).
function updateStamps(){
  if(stampMesh){ root.remove(stampMesh); stampMesh.geometry.dispose(); stampMesh.material.dispose(); stampMesh=null; }
  if(!STAMPS.length) return;
  const pos=[];
  for(const s of STAMPS){
    const p=PANEL_BY_ID[s.panelId]; if(!p) continue;
    const n=s.pts.length; if(n<2) continue;
    const last=(s.closed!==false)?n:n-1;
    for(let k=0;k<last;k++){
      const a=embeddedWorld(p, s.pts[k]), b=embeddedWorld(p, s.pts[(k+1)%n]);
      pos.push(a[0],a[1],a[2], b[0],b[1],b[2]);
    }
  }
  if(!pos.length) return;
  const g=new THREE.BufferGeometry(); g.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
  stampMesh=new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:0x2b2f36, transparent:true, opacity:0.9}));
  stampMesh.renderOrder=2; root.add(stampMesh);
}
// Stitch rendering — make a sewn seam *read* like real saddle stitching:
//   • running stitch: bright thread segments hole→hole along each chain (the
//     visible top thread you see on the leather — also the seam line in plain view)
//   • cross / pull-through: a fainter thread linking each matched A↔B hole pair
//     (the part of the thread that passes between the two panels)
// Both ride the live folded/seated mesh, so the seam stays readable at any zoom.
function updateThread(){
  clearThread();
  if(!SHOW_THREAD) return;
  const run=[], cross=[];
  for(const seam of SEAMS){
    const ca=CHAIN_BY_ID[seam.chainA], cb=CHAIN_BY_ID[seam.chainB]; if(!ca||!cb) continue;
    const pairs=seamPairs(seam, ca, cb);
    for(const pr of pairs){
      const A=holeWorld(ca, pr[0]), B=holeWorld(cb, pr[1]);
      cross.push(A[0],A[1],A[2], B[0],B[1],B[2]);
    }
    for(const ch of [ca, cb]){
      for(let k=0;k<ch.holes.length-1;k++){
        const P=holeWorld(ch,k), Q=holeWorld(ch,k+1);
        run.push(P[0],P[1],P[2], Q[0],Q[1],Q[2]);
      }
    }
  }
  if(cross.length){
    const g=new THREE.BufferGeometry(); g.setAttribute("position", new THREE.Float32BufferAttribute(cross,3));
    threadGroup.add(new THREE.LineSegments(g, new THREE.LineBasicMaterial({color:COL_THREAD, transparent:true, opacity:0.45})));
  }
  if(run.length){
    const g=new THREE.BufferGeometry(); g.setAttribute("position", new THREE.Float32BufferAttribute(run,3));
    const mat=new THREE.LineBasicMaterial({color:COL_THREAD, linewidth:2});
    mat.depthTest=false;  // keep the seam visible even where it hugs the surface
    const seg=new THREE.LineSegments(g, mat); seg.renderOrder=3; threadGroup.add(seg);
  }
}

function writePanelGeometry(panel){
  const pos=panel.mesh.geometry.attributes.position.array;
  for(let i=0;i<panel.X.length;i++){ pos[i*3]=panel.X[i][0]; pos[i*3+1]=panel.X[i][1]; pos[i*3+2]=panel.X[i][2]; }
  panel.mesh.geometry.attributes.position.needsUpdate=true;
  panel.mesh.geometry.computeVertexNormals();
  // thickness shell: top half = surface, bottom half = surface − normal·thickness
  if(panel.shell){
    const N=panel.X.length, sp=panel.shell.geometry.attributes.position.array;
    const nrm=panel.mesh.geometry.attributes.normal.array;
    for(let i=0;i<N;i++){
      sp[i*3]=panel.X[i][0]; sp[i*3+1]=panel.X[i][1]; sp[i*3+2]=panel.X[i][2];
      const o=(N+i)*3;
      sp[o]=panel.X[i][0]-nrm[i*3]*THICKNESS;
      sp[o+1]=panel.X[i][1]-nrm[i*3+1]*THICKNESS;
      sp[o+2]=panel.X[i][2]-nrm[i*3+2]*THICKNESS;
    }
    panel.shell.geometry.attributes.position.needsUpdate=true;
    panel.shell.geometry.computeVertexNormals();
    panel.shell.geometry.computeBoundingSphere();
  }
  // artwork overlay: hug the chosen face, just off the surface along the normal
  // (front = +, back = below the thickness shell), so it rides every fold.
  if(panel.decalMesh){
    const dp=panel.decalMesh.geometry.attributes.position.array;
    const nrm=panel.mesh.geometry.attributes.normal.array;
    const ds=Math.max(0.3, THICKNESS*0.18);
    const off = panel.decalSide ? -(THICKNESS+ds) : ds;
    for(let i=0;i<panel.X.length;i++){
      dp[i*3]=panel.X[i][0]+nrm[i*3]*off;
      dp[i*3+1]=panel.X[i][1]+nrm[i*3+1]*off;
      dp[i*3+2]=panel.X[i][2]+nrm[i*3+2]*off;
    }
    panel.decalMesh.geometry.attributes.position.needsUpdate=true;
    panel.decalMesh.geometry.computeVertexNormals();
    panel.decalMesh.geometry.computeBoundingSphere();
  }
  // outline (boundary edges only)
  const wp=panel.wire.geometry.attributes.position.array;
  panel.boundaryEdges.forEach(([a,b],i)=>{ const A=panel.X[a],B=panel.X[b]; wp[i*6]=A[0];wp[i*6+1]=A[1];wp[i*6+2]=A[2]; wp[i*6+3]=B[0];wp[i*6+4]=B[1];wp[i*6+5]=B[2]; });
  panel.wire.geometry.attributes.position.needsUpdate=true;
  // fold lines
  const fp=panel.foldLine.geometry.attributes.position.array;
  panel.foldSegs.forEach(([a,b],i)=>{ const A=panel.X[a],B=panel.X[b]; fp[i*6]=A[0];fp[i*6+1]=A[1];fp[i*6+2]=A[2]; fp[i*6+3]=B[0];fp[i*6+4]=B[1];fp[i*6+5]=B[2]; });
  panel.foldLine.geometry.attributes.position.needsUpdate=true;
  panel.foldLine.geometry.computeBoundingSphere();
}

let lastStretch=-1;
function reportStretch(){
  let mx=0;
  for(const panel of PANELS) for(const [a,b,rest] of panel.edges){
    const d=len(sub(panel.X[a],panel.X[b])); const e=Math.abs(d-rest)/(rest||1); if(e>mx) mx=e;
  }
  const pct=mx*100;
  if(Math.abs(pct-lastStretch)>0.05){ lastStretch=pct; post({op:"stretchReport", maxStretchPct:pct}); }
  const cls=pct<1?"ok":"warn";
  let seamTxt="";
  if(SEAMS.length){
    let worst=0; for(const r of seamReport) if(r.maxGap>worst) worst=r.maxGap;
    const sc=worst<1.5?"ok":"warn";
    seamTxt=` · seams ${SEAMS.length} · gap <span class="${sc}">${worst.toFixed(1)}mm</span>`;
  } else if(CHAINS.length){
    seamTxt=` · ${CHAINS.length} hole chains`;
  }
  document.getElementById("hud").innerHTML=
    `construct · panels ${PANELS.length} · max stretch <span class="${cls}">${pct.toFixed(2)}%</span>${seamTxt} · tool ${TOOL}`;
}

// ---- custom artwork decals (Phase 4) ---------------------------------------
// A dropped image becomes a transparent overlay riding a panel's mesh (art on
// top of the leather, leather showing through the PNG's transparency). UVs come
// from the panel's flat 2D layout, so the art is positioned by the design. The
// decal is visual-only — it never touches the 2D cut geometry.
let DECALS={};  // panelId -> dataURL
function panelUVs(panel){
  const v=panel.v2d; let minx=1e18,miny=1e18,maxx=-1e18,maxy=-1e18;
  for(const p of v){ if(p[0]<minx)minx=p[0]; if(p[1]<miny)miny=p[1]; if(p[0]>maxx)maxx=p[0]; if(p[1]>maxy)maxy=p[1]; }

  for(let i=0;i<v.length;i++){ uv[i*2]=(v[i][0]-minx)/w; uv[i*2+1]=(v[i][1]-miny)/h; }
  return uv;
}
// Artwork rides a *separate overlay mesh* hugging one face of the panel (not baked
// into the leather albedo), so it can sit on exactly one side and flip to the other.
function ensureDecalMesh(panel){
  if(panel.decalMesh) return panel.decalMesh;
  const g=new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(panel.X.length*3),3));

  clearFoldHi();
  if(!SEL_FOLD || RENDER_MODE==="mockup") return;
  const p=PANEL_BY_ID[SEL_FOLD.panelId]; if(!p||!p.tree) return;
  const rr=regionsOfFold(p, SEL_FOLD.foldId); if(!rr) return;
  const baseM=regionFaceMesh(p, rr.base, 0x39d27a), moveM=regionFaceMesh(p, rr.move, 0xff9a3c);
  if(baseM){ scene.add(baseM); foldHi.push(baseM); }
  if(moveM){ scene.add(moveM); foldHi.push(moveM); }
}
window.setConstructSelectedFold=function(jsonStr){
  let d; try{ d=(typeof jsonStr==="string")?JSON.parse(jsonStr):jsonStr; }catch(e){ d=null; }
  SEL_FOLD=(d&&d.panelId!=null&&d.foldId!=null)?{panelId:d.panelId, foldId:d.foldId}:null;
  if(SEL_FOLD){ const p=PANEL_BY_ID[SEL_FOLD.panelId];
    if(p&&p.tree){ const rr=regionsOfFold(p, SEL_FOLD.foldId);
      if(rr) post({op:"foldSides", panelId:p.id, base:region2DCentroid(p,rr.base), move:region2DCentroid(p,rr.move)}); } }
  updateFoldHi();
};

// ---- artwork placement mode (drop an image → bird's-eye → click a body → drag)
let ARTWORK_MODE=false, ARTWORK_URL=null, ARTWORK_PANEL=-1, ART_IMG={}, DECAL_XF={};
let artDragging=false;
function getDecalXf(pid){ const x=DECAL_XF[pid]||{}; return {ox:+x.ox||0, oy:+x.oy||0, scale:x.scale>0?+x.scale:1, rot:+x.rot||0, mirror:x.mirror?1:0}; }
function applyAndPostDecal(pid, xf, persist){
  const p=PANEL_BY_ID[pid]; if(!p||DECALS[pid]===undefined&&!ARTWORK_URL) return;
  DECAL_XF[pid]=xf;
  applyDecalToPanel(p, DECALS[pid]||ARTWORK_URL, xf);
  if(persist) post({op:"decalFrame", panelId:pid, ox:xf.ox, oy:xf.oy, scale:xf.scale, rot:xf.rot, mirror:xf.mirror});
}
function birdsEye(){
  const box=new THREE.Box3().setFromObject(root); if(!isFinite(box.min.x)) return;
  const c=box.getCenter(new THREE.Vector3()), s=box.getSize(new THREE.Vector3());
  const r=Math.max(s.x,s.z,1)*0.5, dist=r/Math.tan(camera.fov*Math.PI/360)*2.0;
  controls.target.copy(c); camera.position.set(c.x, c.y+dist, c.z+0.001);
  camera.near=Math.max(r*0.01,0.1); camera.far=r*100; camera.updateProjectionMatrix();
}
// Place / re-activate the clicked body, dropping the artwork on it centred.
function artworkPickPanel(pid){
  ARTWORK_PANEL=pid; const p=PANEL_BY_ID[pid]; if(!p) return;
  if(DECALS[pid]===undefined){
    const xf={ox:0,oy:0,scale:1,rot:0,mirror:0}; DECAL_XF[pid]=xf;
    applyDecalToPanel(p, ARTWORK_URL, xf);
    post({op:"decalApplied", panelId:pid, dataURL:ARTWORK_URL});   // Swift persists + frames
  }
}
// Move the artwork so its centre sits at a clicked/dragged panel point.
function artworkMoveTo(hit){
  const pid=ARTWORK_PANEL, p=PANEL_BY_ID[pid]; if(!p||!hit) return;
  const p2=hitTo2D(p, hit.face, hit.point); const v=p.v2d;
  let mnx=1e18,mny=1e18,mxx=-1e18,mxy=-1e18;
  for(const q of v){ if(q[0]<mnx)mnx=q[0]; if(q[1]<mny)mny=q[1]; if(q[0]>mxx)mxx=q[0]; if(q[1]>mxy)mxy=q[1]; }
  const fx=(p2[0]-mnx)/((mxx-mnx)||1), fy=(p2[1]-mny)/((mxy-mny)||1);
  const xf=getDecalXf(pid); xf.ox=2*(fx-0.5); xf.oy=2*(fy-0.5);
  applyAndPostDecal(pid, xf, false);   // post on release
}
window.fillActiveDecal=function(){
  const pid=ARTWORK_PANEL, p=PANEL_BY_ID[pid], img=ART_IMG[pid]; if(!p||!img) return;
  const v=p.v2d; let mnx=1e18,mny=1e18,mxx=-1e18,mxy=-1e18;
  for(const q of v){ if(q[0]<mnx)mnx=q[0]; if(q[1]<mny)mny=q[1]; if(q[0]>mxx)mxx=q[0]; if(q[1]>mxy)mxy=q[1]; }
  const aw=(mxx-mnx)||1, ah=(mxy-mny)||1, W=512, H=Math.max(64,Math.round(512*ah/aw));
  const iw=img.naturalWidth||img.width||W, ih=img.naturalHeight||img.height||H;
  const containR=Math.min(W/iw,H/ih)*0.9, coverR=Math.max(W/iw,H/ih);
  const xf=getDecalXf(pid); xf.scale=coverR/(containR||1e-6); xf.ox=0; xf.oy=0;
  applyAndPostDecal(pid, xf, true);
};
window.flipActiveDecal=function(){
  const pid=ARTWORK_PANEL; if(pid<0) return; const xf=getDecalXf(pid); xf.mirror=xf.mirror?0:1;
  applyAndPostDecal(pid, xf, true);
};
window.flipDecalFace=function(){
  const pid=ARTWORK_PANEL; if(pid<0) return; const xf=getDecalXf(pid); xf.side=xf.side?0:1;
  applyAndPostDecal(pid, xf, true);
};
window.setConstructArtworkMode=function(on, dataURL){
  ARTWORK_MODE=!!on;
  if(on){ ARTWORK_URL=dataURL||ARTWORK_URL; ARTWORK_PANEL=-1; detachGizmo(); clearHover();
    controls.enableRotate=false; birdsEye(); }
  else { ARTWORK_URL=null; ARTWORK_PANEL=-1; controls.enableRotate=true; clearHover(); recenterCamera(); }
};

// ---- camera framing -------------------------------------------------------
window.recenterCamera=function(){
  const box=new THREE.Box3().setFromObject(root);
  if(!isFinite(box.min.x)) return;
  const c=box.getCenter(new THREE.Vector3()), s=box.getSize(new THREE.Vector3());
  const r=Math.max(s.x,s.y,s.z,1)*0.5;
  const dist=r/Math.tan(camera.fov*Math.PI/360)*1.7;
  controls.target.copy(c);
  camera.position.set(c.x+dist*0.6, c.y+dist*0.7, c.z+dist*0.9);
  camera.near=Math.max(r*0.01,0.1); camera.far=r*100; camera.updateProjectionMatrix();
};

// ---- picking --------------------------------------------------------------
const ray=new THREE.Raycaster(); ray.params.Line.threshold=3.0;
const mouse=new THREE.Vector2();
function setMouse(cx,cy){ mouse.x=(cx/window.innerWidth)*2-1; mouse.y=-(cy/window.innerHeight)*2+1; }
let downXY=null, artDrag=false;
renderer.domElement.addEventListener("pointerdown",e=>{
  if(e.button!==0) return;
  downXY=[e.clientX,e.clientY]; artDrag=false;
  // artwork: grab the art on the active body to drag it
  if(ARTWORK_MODE && ARTWORK_PANEL>=0){
    const p=PANEL_BY_ID[ARTWORK_PANEL];
    if(p){ setMouse(e.clientX,e.clientY); ray.setFromCamera(mouse,camera);
      if(ray.intersectObject(p.mesh,false)[0]){ artDrag=true; controls.enabled=false; } }
  }
});
renderer.domElement.addEventListener("pointermove",e=>{
  const cx=e.clientX, cy=e.clientY;
  // crease keeps its dedicated osnap behaviour (constant indicator + rubber-band)
  if(TOOL==="crease"){
    mouse.x=(cx/window.innerWidth)*2-1; mouse.y=-(cy/window.innerHeight)*2+1; ray.setFromCamera(mouse,camera);
    const target = CREASE_PT ? PANEL_BY_ID[CREASE_PT.panelId] : null;
    const hit = target ? ray.intersectObject(target.mesh,false)[0]
                       : ray.intersectObjects(PANELS.map(p=>p.mesh),false)[0];
    if(!hit){ hideSnapIndicator(); return; }
    const panel = target || PANEL_BY_ID[hit.object.userData.panelId];
    const sp=snapCreasePoint(panel, hit, cx, cy); showSnapIndicator(sp, cx, cy);
    if(CREASE_PT) showCreasePreview(CREASE_PT.world, sp.world);
    return;
  }
  // artwork: drag the art to follow the cursor on the active body; else hover bodies
  if(ARTWORK_MODE){
    if(artDrag){ const p=PANEL_BY_ID[ARTWORK_PANEL];
      if(p){ setMouse(cx,cy); ray.setFromCamera(mouse,camera); const hit=ray.intersectObject(p.mesh,false)[0]; if(hit) artworkMoveTo(hit); } }
    else { const hit=panelHitAt(cx,cy); setHoverPanel(hit?hit.object.userData.panelId:-1);
      renderer.domElement.style.cursor = hit?"pointer":"default"; }
    return;
  }
  // live hover for every tool, so the click selects exactly what's highlighted
  if(TOOL==="select" || TOOL==="fold"){
    const f=pickFoldAt(cx,cy);
    if(f){ showHoverPts([f.a,f.b]); setHoverPanel(-1); renderer.domElement.style.cursor="pointer"; }
    else { clearHoverLine(); const hit=panelHitAt(cx,cy); setHoverPanel(hit?hit.object.userData.panelId:-1); renderer.domElement.style.cursor="default"; }
  } else if(TOOL==="ground" || TOOL==="glue" || TOOL==="move"){
    clearHoverLine(); const hit=panelHitAt(cx,cy); setHoverPanel(hit?hit.object.userData.panelId:-1);
    renderer.domElement.style.cursor=hit?"pointer":"default";
  } else if(TOOL==="stitch"){
    const cid=chainNearestAt(panelHitAt(cx,cy)); const poly=cid>=0?chainPolyWorld(cid):null;
    if(poly) showHoverPts(poly); else clearHoverLine(); setHoverPanel(-1);
    renderer.domElement.style.cursor=cid>=0?"pointer":"default";
  } else { clearHover(); }
});
renderer.domElement.addEventListener("pointerup",e=>{
  if(e.button!==0) return;
  const wasArt=artDrag; artDrag=false; controls.enabled=true;
  if(!downXY) return;
  const moved=Math.hypot(e.clientX-downXY[0], e.clientY-downXY[1]); downXY=null;
  // artwork: finish a drag (persist), or a click picks / drops onto a body
  if(ARTWORK_MODE){
    if(wasArt && moved>4){ if(ARTWORK_PANEL>=0) applyAndPostDecal(ARTWORK_PANEL, getDecalXf(ARTWORK_PANEL), true); return; }
    const hit=panelHitAt(e.clientX,e.clientY); if(hit) artworkPickPanel(hit.object.userData.panelId);
    return;
  }
  if(moved>4) return; // a camera drag, not a click
  if(TOOL==="crease"){
    setMouse(e.clientX,e.clientY); ray.setFromCamera(mouse,camera);
    const hit=ray.intersectObjects(PANELS.map(p=>p.mesh),false)[0];
    if(hit){ const panel=PANEL_BY_ID[hit.object.userData.panelId]; const sp=snapCreasePoint(panel, hit, e.clientX, e.clientY);
      if(!CREASE_PT || CREASE_PT.panelId!==panel.id){ CREASE_PT={panelId:panel.id, p2d:sp.p2d, world:sp.world}; showCreaseMark(CREASE_PT.world); }
      else { post({op:"addFold", panelId:panel.id, seg:[CREASE_PT.p2d, sp.p2d]}); CREASE_PT=null; hideCreaseMark(); } }
    return;
  }
  if(TOOL==="stitch"){
    const cid=chainNearestAt(panelHitAt(e.clientX,e.clientY));
    if(cid>=0) post({op:"selectChain", chainId:cid});
    return;
  }
  if(TOOL==="ground" || TOOL==="glue"){
    const hit=panelHitAt(e.clientX,e.clientY);
    if(hit){ const panel=PANEL_BY_ID[hit.object.userData.panelId];
      post({op:"selectPanel", panelId:panel.id, p2d:hitTo2D(panel, hit.face, hit.point)}); }
    return;
  }
  if(TOOL==="move"){
    const hit=panelHitAt(e.clientX,e.clientY);
    if(hit) attachGizmo(PANEL_BY_ID[hit.object.userData.panelId]); else detachGizmo();
    return;
  }
  // select / fold → nearest fold by screen distance (exactly what hover showed)
  const f=pickFoldAt(e.clientX,e.clientY);
  if(f) post({op:"selectFold", panelId:f.panelId, foldId:f.foldId});
});

// ---- loop -----------------------------------------------------------------
function tick(){
  requestAnimationFrame(tick);
  try{
    if(needsPose){ needsPose=false; recomputePose(); }
    controls.update();
    renderer.render(scene,camera);
  }catch(e){ if(!window.__rerr){ window.__rerr=1; post({op:"consoleError", message:"RENDER: "+((e&&e.message)||e)+" @ "+((e&&e.stack)||"").slice(0,300)}); } }
}
window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
tick();
post({op:"ready"});
</script>
</body>
